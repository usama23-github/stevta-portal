services:
  postgres:
    image: postgres:15
    container_name: stevta_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stevta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # backend:
  #   build: ./backend
  #   container_name: stevta_backend
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./backend:/app
  #     - /app/node_modules
  #   env_file:
  #     - ./backend/.env
  #   depends_on:
  #     - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: stevta_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ./backend/.env.staging
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./frontend/.env.staging
    container_name: stevta_frontend
    ports:
    - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  # frontend:
  #   build: ./frontend
  #   container_name: stevta_frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  pgdata: